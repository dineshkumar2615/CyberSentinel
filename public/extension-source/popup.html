<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>CyberSentinel Encognito</title>
    <style>
        body {
            width: 250px;
            padding: 16px;
            margin: 0;
            background-color: #0a0f14;
            color: #e5e7eb;
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            border: 1px solid rgba(0, 255, 157, 0.3);
        }
        h2 {
            margin: 0 0 16px 0;
            font-size: 14px;
            color: #00ff9d;
            text-transform: uppercase;
            font-weight: 900;
            font-style: italic;
            letter-spacing: 0.05em;
            text-align: center;
        }
        p {
            font-size: 12px;
            color: #9ca3af;
            line-height: 1.5;
            text-align: center;
            margin: 0 0 16px 0;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: rgba(0, 255, 157, 0.1);
            color: #00ff9d;
            border: 1px solid rgba(0, 255, 157, 0.3);
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 10px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .btn:hover {
            background: rgba(0, 255, 157, 0.2);
        }
    </style>
</head>
<body>
    <h2>CyberSentinel</h2>
    <p>The Cipher Widget is active on WhatsApp and Instagram Web.</p>
    <a href="#" class="btn" id="open-dashboard">Dashboard</a>
    <script src="popup.js"></script>
</body>
</html>
